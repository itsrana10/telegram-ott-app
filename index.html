<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineBox BD</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#141414;
    color:white;
    font-family:Arial,sans-serif;
}

.header{
    background:#e50914;
    padding:15px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
    position:sticky;
    top:0;
}

.search{
    padding:15px;
}

.search input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    font-size:16px;
}

.container{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
    gap:15px;
    padding:15px;
}

.movie{
    background:#222;
    border-radius:10px;
    overflow:hidden;
}

.movie img{
    width:100%;
    height:250px;
    object-fit:cover;
}

.movie h3{
    padding:10px;
    font-size:16px;
}

.btn{
    width:90%;
    margin:10px;
    padding:10px;
    border:none;
    border-radius:6px;
    background:#e50914;
    color:white;
    font-size:15px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
 CineBox BD
</div>

<div class="search">
<input type="text" placeholder="Search Movies...">
</div>

<div class="container">

<div class="movie">
<img src="https://via.placeholder.com/300x450?text=Movie+1">
<h3>Movie 1</h3>
<button class="btn"
onclick="window.open('https://t.me/CineBox_BD_Bot?start=movie1')">
▶ Watch Now
</button>
</div>

<div class="movie">
<img src="https://via.placeholder.com/300x450?text=Movie+2">
<h3>Movie 2</h3>
<button class="btn"
onclick="window.open('https://t.me/CineBox_BD_Bot?start=movie2')">
▶ Watch Now
</button>
</div>

<div class="movie">
<img src="https://via.placeholder.com/300x450?text=Movie+3">
<h3>Movie 3</h3>
<button class="btn"
onclick="window.open('https://t.me/CineBox_BD_Bot?start=movie3')">
▶ Watch Now
</button>
</div>

</div>

</body>
</html>
